syntax = "proto3"; //proto3을 사용함

option java_multiple_files = true;
option java_package = "grpc.product";
option java_outer_classname = "ProductProto";

service UpdateProductQuantityStub {
  rpc updateProductQuantity (UpdateProductQuantityRequest) returns (UpdateProductQuantityResponse);
}

message UpdateProductQuantityRequest {
  int64 productId = 1;
  int64 quantity = 2;
  string quantityType = 3;
}

message UpdateProductQuantityResponse {
  bool result = 1;
  string errorMsg = 2;
}


service FindProductStub {
  rpc findProduct (FindProductRequest) returns (FindProductResponse);
}

message FindProductRequest {
  int64 productId = 1;
}

message FindProductResponse {
  bool result = 1;
  string errorMsg = 2;
  int64 productId = 3;
  string sellerEmail = 4;
  string productName = 5;
  string productImgUrl = 6;
  string descriptionImgUrl = 7;
  repeated string keywords = 8;
  repeated string productOption = 9;
  int64 price = 10;
  int64 quantity = 11;
  string category = 12;
  string regDateTime = 13;
}