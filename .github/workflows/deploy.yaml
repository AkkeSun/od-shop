name: od-shop

on:
  push:
    branches:
      - dev-ci
    paths:
      - 'account/**'
      - 'product/**'
      - 'account-agent/**'
      - 'product-agent/**'

jobs:
  ################### module check ###################
  module-check:
    runs-on: ubuntu-latest
    outputs:
      account_api_changed: ${{ steps.check-account.outputs.changed }}
      product_api_changed: ${{ steps.check-product.outputs.changed }}
      account_agent_changed: ${{ steps.check-account-agent.outputs.changed }}
      product_agent_changed: ${{ steps.check-product-agent.outputs.changed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check Account API Changes
        id: check-account
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^account/'; then
            echo "changed=true" >> $GITHUB_OUTPUT  
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Product API Changes
        id: check-product
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^product/'; then
            echo "changed=true" >> $GITHUB_OUTPUT  
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Account Agent API Changes
        id: check-account-agent
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^account-agent/'; then
            echo "changed=true" >> $GITHUB_OUTPUT  
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Product Agent API Changes
        id: check-product-agent
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^product-agent/'; then
            echo "changed=true" >> $GITHUB_OUTPUT  
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  ################### [CI] account-api ###################
  ci-account-api:
    needs: module-check
    if: needs.module-check.outputs.account_api_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build Account API
        run: |
          cd account
          ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(TZ=Asia/Seoul date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          cd account
          docker buildx build --platform linux/arm64 -t akkessun/account-api:${IMAGE_TAG} . --push

  ################### [CI] product-api ###################
  ci-product-api:
    needs: module-check
    if: needs.module-check.outputs.product_api_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build Product API
        run: |
          cd product
          ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(TZ=Asia/Seoul date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          cd product
          docker buildx build --platform linux/arm64 -t akkessun/product-api:${IMAGE_TAG} . --push

  ################### [CI] product-agent ###################
  ci-product-agent:
    needs: module-check
    if: needs.module-check.outputs.product_agent_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build Product Agent
        run: |
          cd product-agent
          ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(TZ=Asia/Seoul date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          cd product-agent
          docker buildx build --platform linux/arm64 -t akkessun/product-agent:${IMAGE_TAG} . --push

  ################### [CI] account-agent ###################
  ci-account-agent:
    needs: module-check
    if: needs.module-check.outputs.account_agent_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build Account Agent
        run: |
          cd account-agent
          ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(TZ=Asia/Seoul date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          cd account-agent
          docker buildx build --platform linux/arm64 -t akkessun/account-agent:${IMAGE_TAG} . --push